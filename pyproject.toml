[project]
name = "hsds_entity_resolution"
requires-python = ">=3.10,<3.15"
version = "0.1.0"
dependencies = [
    "dagster==1.12.17",
]

[dependency-groups]
dev = [
    "dagster-webserver",
    "dagster-dg-cli",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
force-include = { "pyproject.toml" = "pyproject.toml" }

[tool.dg]
directory_type = "project"

[tool.dg.project]
root_module = "hsds_entity_resolution"
registry_modules = [
    "hsds_entity_resolution.components.*",
]

[project.entry-points]
"dagster_dg_cli.registry_modules" = { hsds_entity_resolution = "hsds_entity_resolution.components" }